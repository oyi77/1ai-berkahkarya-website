# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# /1ai → /one-ai (301)
[[redirects]]
  from = "/id/1ai"
  to = "/id/one-ai"
  status = 301
  force = true

[[redirects]]
  from = "/en/1ai"
  to = "/en/one-ai"
  status = 301
  force = true

# OmniRoute → one-ai (301 permanent, SEO-safe)
[[redirects]]
  from = "/id/omniroute"
  to = "/id/one-ai"
  status = 301
  force = true

[[redirects]]
  from = "/en/omniroute"
  to = "/en/one-ai"
  status = 301
  force = true

[[redirects]]
  from = "/omniroute"
  to = "/id/one-ai"
  status = 301
  force = true

# Belajar AI Academy — clean URL redirects
[[redirects]]
  from = "/belajar"
  to = "/id/belajarai"
  status = 301
  force = true

[[redirects]]
  from = "/kurikulum"
  to = "/id/belajar/kurikulum"
  status = 301
  force = true

[[redirects]]
